<!DOCTYPE html>
<html>
<head>
    <title>اختبار Firebase</title>
</head>
<body>
    <h1>اختبار الاتصال بقاعدة البيانات</h1>
    <div id="result"></div>

    <!-- تحميل Firebase من CDN -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"></script>

    <script>
        // إعدادات Firebase (نفس الإعدادات)
        const firebaseConfig = {
            apiKey: "AIzaSyCO_VTLgQkTOv_MkB0SEdSEYdRMi9IdMFA",
            authDomain: "alzak-store-dea53.firebaseapp.com",
            projectId: "alzak-store-dea53",
            storageBucket: "alzak-store-dea53.firebasestorage.app",
            messagingSenderId: "494547602038",
            appId: "1:494547602038:web:f9f78605414173ae63ed57"
        };

        // تهيئة Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // محاولة جلب بيانات من مجموعة users
        db.collection('users').get().then((snapshot) => {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `✅ تم الاتصال! عدد المستخدمين: ${snapshot.size}`;
        }).catch((error) => {
            document.getElementById('result').innerHTML = `❌ خطأ: ${error.message}`;
        });
    </script>
</body>
</html>
