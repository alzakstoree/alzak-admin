<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دخول المدير</title>
    <style>
        body { background: #0a0a0a; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .box { background: #111; border: 2px solid #fbbf24; border-radius: 30px; padding: 40px; width: 300px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #333; border: 1px solid #fbbf24; border-radius: 10px; color: white; }
        button { width: 100%; padding: 12px; background: #fbbf24; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .error { color: red; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color:#fbbf24; text-align:center;">دخول المدير</h2>
        <input type="email" id="email" value="alolao45y@gmail.com">
        <input type="password" id="password" value="admin123">
        <button onclick="handleLogin()">دخول</button>
        <div class="error" id="error"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"></script>
    <script>
        // إعدادات Firebase
        firebase.initializeApp({
            apiKey: "AIzaSyCO_VTLgQkTOv_MkB0SEdSEYdRMi9IdMFA",
            authDomain: "alzak-store-dea53.firebaseapp.com",
            projectId: "alzak-store-dea53",
            storageBucket: "alzak-store-dea53.firebasestorage.app",
            messagingSenderId: "494547602038",
            appId: "1:494547602038:web:f9f78605414173ae63ed57"
        });
        const auth = firebase.auth();

        // تعريف الدالة على window
        window.handleLogin = function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');
            errorDiv.style.display = 'none';

            auth.signInWithEmailAndPassword(email, password)
                .then(userCredential => {
                    if (userCredential.user.email === 'alolao45y@gmail.com') {
                        window.location.href = 'dashboard.html';
                    } else {
                        auth.signOut();
                        errorDiv.textContent = 'غير مصرح';
                        errorDiv.style.display = 'block';
                    }
                })
                .catch(err => {
                    errorDiv.textContent = err.message;
                    errorDiv.style.display = 'block';
                });
        };
    </script>
</body>
</html>
