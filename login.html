<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دخول المدير - ALZAK STORE</title>
    <style>
        body {
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: system-ui;
        }
        .login-box {
            background: #111;
            border: 2px solid #fbbf24;
            border-radius: 30px;
            padding: 40px 30px;
            width: 100%;
            max-width: 350px;
            text-align: center;
        }
        h2 {
            color: #fbbf24;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 15px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus {
            border-color: #fbbf24;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #fbbf24;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        .error {
            color: #ef4444;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>دخول لوحة الإدارة</h2>
        <input type="email" id="email" placeholder="البريد الإلكتروني" value="alolao45y@gmail.com">
        <input type="password" id="password" placeholder="كلمة المرور" value="admin123">
        <button onclick="handleLogin()">دخول</button>
        <div class="error" id="errorMessage"></div>
    </div>

    <!-- تحميل Firebase من CDN (بدون أي ملفات إضافية) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"></script>

    <script>
        // 1. إعدادات Firebase (تأكد من صحتها)
        const firebaseConfig = {
            apiKey: "AIzaSyCO_VTLgQkTOv_MkB0SEdSEYdRMi9IdMFA",
            authDomain: "alzak-store-dea53.firebaseapp.com",
            projectId: "alzak-store-dea53",
            storageBucket: "alzak-store-dea53.firebasestorage.app",
            messagingSenderId: "494547602038",
            appId: "1:494547602038:web:f9f78605414173ae63ed57"
        };

        // 2. تهيئة Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const ADMIN_EMAIL = 'alolao45y@gmail.com';

        // 3. تعريف الدالة على window (لتكون متاحة للزر)
        window.handleLogin = function() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.style.display = 'none';

            if (!email || !password) {
                errorDiv.textContent = '❌ الرجاء إدخال البريد الإلكتروني وكلمة المرور';
                errorDiv.style.display = 'block';
                return;
            }

            auth.signInWithEmailAndPassword(email, password)
                .then(userCredential => {
                    const user = userCredential.user;
                    if (user.email === ADMIN_EMAIL) {
                        // توجيه إلى لوحة التحكم
                        window.location.href = 'dashboard.html';
                    } else {
                        auth.signOut();
                        errorDiv.textContent = '❌ غير مصرح بالدخول';
                        errorDiv.style.display = 'block';
                    }
                })
                .catch(error => {
                    errorDiv.style.display = 'block';
                    if (error.code === 'auth/user-not-found') {
                        errorDiv.textContent = '❌ المستخدم غير موجود';
                    } else if (error.code === 'auth/wrong-password') {
                        errorDiv.textContent = '❌ كلمة المرور غير صحيحة';
                    } else {
                        errorDiv.textContent = '❌ ' + error.message;
                    }
                });
        };

        // 4. اختياري: تسجيل رسالة في Console للتأكد من تحميل السكريبت
        console.log('✅ تم تحميل السكريبت وتهيئة Firebase');
        console.log('📌 نوع handleLogin:', typeof handleLogin); // يجب أن يظهر "function"
    </script>
</body>
</html>
