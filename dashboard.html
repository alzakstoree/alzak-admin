<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - ALZAK STORE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* تنسيقات إضافية للوحة التحكم */
        body {
            padding: 15px;
            background: #0a0a0a;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        #logoutBtn {
            background: #ef4444;
            color: #fff;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fbbf24;
        }
    </style>
</head>
<body>
    <div class="admin-header">
        <h2><i class="fas fa-crown" style="color: #fbbf24;"></i> لوحة التحكم</h2>
        <div class="user-info">
            <span id="adminName"></span>
            <button id="logoutBtn" onclick="logout()" style="display: none;">تسجيل خروج</button>
        </div>
    </div>

    <div class="admin-tabs">
        <button class="tab-btn active" onclick="showAdminTab('products')">المنتجات</button>
        <button class="tab-btn" onclick="showAdminTab('orders')">الطلبات</button>
        <button class="tab-btn" onclick="showAdminTab('charges')">طلبات الشحن</button>
        <button class="tab-btn" onclick="showAdminTab('users')">العملاء</button>
        <button class="tab-btn" onclick="showAdminTab('stats')">الإحصائيات</button>
    </div>

    <div id="adminProducts" class="admin-tab-content active"></div>
    <div id="adminOrders" class="admin-tab-content"></div>
    <div id="adminCharges" class="admin-tab-content"></div>
    <div id="adminUsers" class="admin-tab-content"></div>
    <div id="adminStats" class="admin-tab-content"></div>

    <div id="toast" class="toast"></div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/helpers.js"></script>
    <script type="module" src="js/store-data.js"></script>
    <script type="module" src="js/wallet.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/admin.js"></script>
    <script>
        // عند تحميل الصفحة، نتحقق من أن المستخدم مدير، ثم نحمّل البيانات
        import { isAdmin } from './js/auth.js'; // لا يمكن الاستيراد هنا بهذه الطريقة، لذلك سنضعه داخل module
    </script>
    <script type="module">
        import { currentUser, isAdmin } from './js/auth.js';
        import { showAdminPanel } from './js/admin.js';

        // انتظار تحقق auth ثم تحميل البيانات
        setTimeout(() => {
            if (!currentUser || !isAdmin()) {
                // إذا لم يكن مديراً، نعيد التوجيه
                window.location.href = 'index.html';
            } else {
                showAdminPanel(); // تحميل البيانات
            }
        }, 1000);
    </script>
</body>
</html>
