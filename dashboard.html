<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - ALZAK STORE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background: #0a0a0a; padding: 0; margin: 0; }
        .dashboard-container { padding: 20px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #111; padding: 15px 20px; border-radius: 15px; border: 2px solid #333; }
        .admin-header h2 { color: #fbbf24; font-size: 24px; }
        .admin-header h2 i { margin-left: 10px; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-info span { color: #fbbf24; font-weight: 700; }
        #logoutBtn { background: #ef4444; color: #fff; border: none; padding: 8px 20px; border-radius: 30px; font-weight: 700; cursor: pointer; display: none; }
        #logoutBtn:hover { background: #dc2626; }
    </style>
</head>
<body>
    <!-- القائمة الجانبية (نفس الكود السابق) -->
    <div id="sideMenu" class="side-menu">...</div> <!-- اختصاراً، اترك محتوى القائمة كما هو -->

    <div class="dashboard-container">
        <!-- الهيدر -->
        <div class="admin-header">
            <div style="display: flex; align-items: center; gap: 15px;">
                <i class="fas fa-bars" onclick="toggleSideMenu()" style="font-size: 24px; color: #fbbf24; cursor: pointer;"></i>
                <h2><i class="fas fa-crown"></i> لوحة التحكم</h2>
            </div>
            <div class="user-info">
                <span id="adminName"></span>
                <button id="logoutBtn" onclick="logout()">تسجيل خروج</button>
            </div>
        </div>

        <!-- باقي البطاقات كما هي -->
        <!-- ... -->
    </div>

    <div id="toast" class="toast"></div>

    <!-- استيراد Firebase مباشرة -->
    <script type="module">
        // استيراد الوحدات
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        // إعدادات Firebase (انسخها من firebase-config.js)
        const firebaseConfig = {
            apiKey: "AIzaSyCO_VTLgQkTOv_MkB0SEdSEYdRMi9IdMFA",
            authDomain: "alzak-store-dea53.firebaseapp.com",
            projectId: "alzak-store-dea53",
            storageBucket: "alzak-store-dea53.firebasestorage.app",
            messagingSenderId: "494547602038",
            appId: "1:494547602038:web:f9f78605414173ae63ed57"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ADMIN_EMAIL = 'alolao45y@gmail.com';

        // دالة toggleSideMenu
        window.toggleSideMenu = function() {
            document.getElementById('sideMenu').classList.toggle('show');
        };

        // دالة showComingSoon (مؤقتة)
        window.showComingSoon = function(item) {
            alert(`🚧 ${item} قيد التطوير`);
        };

        window.toggleMaintenance = function() {
            alert('🔧 وضع الصيانة قيد التفعيل (وهمي)');
        };

        // مراقبة حالة المصادقة
        onAuthStateChanged(auth, (user) => {
            if (user && user.email === ADMIN_EMAIL) {
                // مستخدم مدير، نعرض اسمه وزر الخروج
                document.getElementById('adminName').textContent = user.displayName || user.email;
                document.getElementById('logoutBtn').style.display = 'block';
                // هنا يمكنك استدعاء دوال تحميل البيانات من admin.js
                // لكن سنحتاج لاستيراد admin.js أيضاً. يمكن إضافته لاحقاً.
            } else {
                // ليس مديراً أو لا يوجد مستخدم، نوجه إلى صفحة الدخول
                window.location.href = 'login.html';
            }
        });

        // دالة تسجيل الخروج
        window.logout = function() {
            signOut(auth).then(() => {
                // التوجيه سيتم تلقائياً عبر onAuthStateChanged
            });
        };
    </script>
    <!-- استيراد admin.js بشكل منفصل -->
    <script type="module" src="js/admin.js"></script>
</body>
</html>
