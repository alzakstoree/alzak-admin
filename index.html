<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>لوحة تحكم ALZAK STORE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- قسم تسجيل الدخول -->
    <div id="loginSection">
        <div class="login-box">
            <h2>🔐 دخول المدير</h2>
            <input type="password" id="adminPassword" placeholder="كلمة المرور">
            <button onclick="checkPassword()">دخول</button>
        </div>
    </div>

    <!-- لوحة التحكم (تظهر بعد تسجيل الدخول) -->
    <div id="adminPanel" style="display: none;">
        <!-- الهيدر -->
        <div class="header">
            <h1><i class="fas fa-crown"></i> لوحة تحكم ALZAK STORE</h1>
            <button onclick="logout()">تسجيل خروج</button>
        </div>

        <!-- قائمة التبويبات -->
        <div class="menu">
            <button onclick="showAdminTab('products')"><i class="fas fa-box"></i> المنتجات</button>
            <button onclick="showAdminTab('orders')"><i class="fas fa-shopping-cart"></i> الطلبات</button>
            <button onclick="showAdminTab('users')"><i class="fas fa-users"></i> العملاء</button>
            <button onclick="showAdminTab('stats')"><i class="fas fa-chart-bar"></i> الإحصائيات</button>
        </div>

        <!-- محتوى الأقسام (يتم ملؤها عبر admin.js) -->
        <div id="adminProducts" class="admin-tab-content"></div>
        <div id="adminOrders" class="admin-tab-content"></div>
        <div id="adminUsers" class="admin-tab-content"></div>
        <div id="adminStats" class="admin-tab-content"></div>
    </div>

    <!-- عنصر الإشعارات -->
    <div id="toast" class="toast"></div>

    <!-- استدعاء admin.js -->
    <script src="admin.js"></script>
</body>
</html>
