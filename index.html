<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>لوحة تحكم ALZAK STORE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- شاشة تسجيل الدخول -->
    <div id="loginSection" class="login-container">
        <div class="login-box">
            <h2>🔐 دخول المدير</h2>
            <input type="password" id="adminPassword" placeholder="كلمة المرور">
            <button onclick="checkPassword()">دخول</button>
        </div>
    </div>

    <!-- لوحة التحكم (تظهر بعد تسجيل الدخول) -->
    <div id="adminPanel" style="display: none;">
        <!-- الهيدر -->
        <div class="header">
            <h1><i class="fas fa-crown" style="color: #fbbf24;"></i> لوحة تحكم ALZAK STORE</h1>
            <button onclick="logout()" class="logout-btn">تسجيل خروج</button>
        </div>

        <!-- أزرار التبويبات (تستدعي showAdminTab) -->
        <div class="menu">
            <button class="tab-btn" onclick="showAdminTab('products')"><i class="fas fa-box"></i> المنتجات</button>
            <button class="tab-btn" onclick="showAdminTab('orders')"><i class="fas fa-shopping-cart"></i> الطلبات</button>
            <button class="tab-btn" onclick="showAdminTab('users')"><i class="fas fa-users"></i> العملاء</button>
            <button class="tab-btn" onclick="showAdminTab('stats')"><i class="fas fa-chart-bar"></i> الإحصائيات</button>
        </div>

        <!-- محتوى الأقسام (يملأ بواسطة admin.js) -->
        <div id="adminProducts" class="admin-tab-content"></div>
        <div id="adminOrders" class="admin-tab-content"></div>
        <div id="adminUsers" class="admin-tab-content"></div>
        <div id="adminStats" class="admin-tab-content"></div>
    </div>

    <!-- عنصر الإشعارات (toast) -->
    <div id="toast" class="toast"></div>

    <!-- استدعاء admin.js (بدون Firebase) -->
    <script src="admin.js"></script>
</body>
</html>
