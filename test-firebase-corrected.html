<!DOCTYPE html>
<html>
<head>
    <title>اختبار Firebase النهائي</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #0a0a0a; color: white; }
        button { padding: 15px 30px; background: #fbbf24; border: none; border-radius: 10px; font-size: 18px; margin: 20px; cursor: pointer; }
        pre { background: #111; padding: 15px; border-radius: 10px; text-align: left; direction: ltr; overflow: auto; }
        .success { color: #22c55e; }
        .error { color: #ef4444; }
    </style>
</head>
<body>
    <h1>🔥 اختبار الاتصال بقاعدة البيانات</h1>
    <button onclick="testFirebase()">اضغط لاختبار Firebase</button>
    <div id="result" style="margin-top: 20px;"></div>

    <!-- تحميل Firebase من CDN الرسمي (إصدار مستقر 8.10.1) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // إعدادات Firebase (نفس الإعدادات)
        const firebaseConfig = {
            apiKey: "AIzaSyCO_VTLgQkTOv_MkB0SEdSEYdRMi9IdMFA",
            authDomain: "alzak-store-dea53.firebaseapp.com",
            projectId: "alzak-store-dea53",
            storageBucket: "alzak-store-dea53.firebasestorage.app",
            messagingSenderId: "494547602038",
            appId: "1:494547602038:web:f9f78605414173ae63ed57"
        };

        window.testFirebase = function() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '⏳ جاري الاتصال...';
            resultDiv.className = '';

            try {
                // تهيئة Firebase
                firebase.initializeApp(firebaseConfig);
                // ✅ اسم الخدمة الصحيح: firebase.firestore()
                const db = firebase.firestore(); 

                // محاولة جلب بيانات من مجموعة users
                db.collection('users').get().then((snapshot) => {
                    let usersHtml = '';
                    snapshot.forEach(doc => {
                        usersHtml += `<li>${JSON.stringify(doc.data())}</li>`;
                    });

                    resultDiv.innerHTML = `
                        <p class="success">✅ تم الاتصال بنجاح!</p>
                        <p>عدد المستخدمين: ${snapshot.size}</p>
                        <pre>${usersHtml}</pre>
                    `;
                }).catch((error) => {
                    console.error(error);
                    resultDiv.innerHTML = `<p class="error">❌ خطأ في جلب البيانات: ${error.message}</p>`;
                });
            } catch (e) {
                console.error(e);
                resultDiv.innerHTML = `<p class="error">❌ خطأ في التهيئة: ${e.message}</p>`;
            }
        };
    </script>
</body>
</html>
